---
# Verification playbook for Kubernetes cluster installation
# Run this playbook to verify that all components are properly installed

################################################################################
# Verify Prerequisites on All Nodes
################################################################################
- name: Verify Kubernetes Prerequisites
  hosts: all
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Check containerd service status
      systemd:
        name: containerd
      register: containerd_service
      failed_when: false
    
    - name: Verify containerd is running
      assert:
        that:
          - containerd_service.status.ActiveState == "active"
        fail_msg: "containerd is not running"
        success_msg: "✓ containerd is running"
    
    - name: Check kubelet service status
      systemd:
        name: kubelet
      register: kubelet_service
      failed_when: false
    
    - name: Verify kubelet is enabled
      assert:
        that:
          - kubelet_service.status.UnitFileState == "enabled"
        fail_msg: "kubelet is not enabled"
        success_msg: "✓ kubelet is enabled"
    
    - name: Check kubeadm version
      command: kubeadm version -o short
      register: kubeadm_version
      changed_when: false
      failed_when: false
    
    - name: Display kubeadm version
      debug:
        msg: "✓ kubeadm version: {{ kubeadm_version.stdout }}"
      when: kubeadm_version.rc == 0
    
    - name: Check kubectl version
      command: kubectl version --client -o yaml
      register: kubectl_version
      changed_when: false
      failed_when: false
    
    - name: Verify kubectl is installed
      assert:
        that:
          - kubectl_version.rc == 0
        fail_msg: "kubectl is not installed or not working"
        success_msg: "✓ kubectl is installed"
    
    - name: Check if swap is disabled
      command: swapon --show
      register: swap_status
      changed_when: false
      failed_when: false
    
    - name: Verify swap is disabled
      assert:
        that:
          - swap_status.stdout == ""
        fail_msg: "Swap is still enabled"
        success_msg: "✓ Swap is disabled"
    
    - name: Check if overlay module is loaded
      shell: lsmod | grep overlay
      register: overlay_module
      changed_when: false
      failed_when: false
    
    - name: Verify overlay module
      assert:
        that:
          - overlay_module.rc == 0
        fail_msg: "overlay kernel module not loaded"
        success_msg: "✓ overlay kernel module loaded"
    
    - name: Check if br_netfilter module is loaded
      shell: lsmod | grep br_netfilter
      register: br_netfilter_module
      changed_when: false
      failed_when: false
    
    - name: Verify br_netfilter module
      assert:
        that:
          - br_netfilter_module.rc == 0
        fail_msg: "br_netfilter kernel module not loaded"
        success_msg: "✓ br_netfilter kernel module loaded"
    
    - name: Check sysctl net.bridge.bridge-nf-call-iptables
      command: sysctl net.bridge.bridge-nf-call-iptables
      register: sysctl_bridge_iptables
      changed_when: false
      failed_when: false
    
    - name: Verify bridge-nf-call-iptables is set
      assert:
        that:
          - "'net.bridge.bridge-nf-call-iptables = 1' in sysctl_bridge_iptables.stdout"
        fail_msg: "net.bridge.bridge-nf-call-iptables not set to 1"
        success_msg: "✓ net.bridge.bridge-nf-call-iptables = 1"
    
    - name: Check sysctl net.ipv4.ip_forward
      command: sysctl net.ipv4.ip_forward
      register: sysctl_ip_forward
      changed_when: false
      failed_when: false
    
    - name: Verify ip_forward is enabled
      assert:
        that:
          - "'net.ipv4.ip_forward = 1' in sysctl_ip_forward.stdout"
        fail_msg: "net.ipv4.ip_forward not set to 1"
        success_msg: "✓ net.ipv4.ip_forward = 1"
    
    - name: Check containerd socket
      stat:
        path: /run/containerd/containerd.sock
      register: containerd_socket
    
    - name: Verify containerd socket exists
      assert:
        that:
          - containerd_socket.stat.exists
          - containerd_socket.stat.issock
        fail_msg: "containerd socket not found"
        success_msg: "✓ containerd socket exists"

################################################################################
# Verify Master Node Specific Components
################################################################################
- name: Verify Kubernetes Master Node
  hosts: masters
  become: yes
  gather_facts: no
  
  tasks:
    - name: Check if admin.conf exists
      stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf
    
    - name: Verify admin.conf exists
      assert:
        that:
          - admin_conf.stat.exists
        fail_msg: "Kubernetes admin.conf not found - cluster may not be initialized"
        success_msg: "✓ Kubernetes cluster initialized (admin.conf exists)"
    
    - name: Check control plane pods
      command: kubectl get pods -n kube-system -o wide
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: control_plane_pods
      changed_when: false
      failed_when: false
    
    - name: Display control plane pods
      debug:
        msg: "{{ control_plane_pods.stdout_lines }}"
      when: control_plane_pods.rc == 0
    
    - name: Check if kube-apiserver is running
      shell: kubectl get pods -n kube-system | grep kube-apiserver | grep Running
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: apiserver_running
      changed_when: false
      failed_when: false
    
    - name: Verify kube-apiserver is running
      assert:
        that:
          - apiserver_running.rc == 0
        fail_msg: "kube-apiserver is not running"
        success_msg: "✓ kube-apiserver is running"
    
    - name: Get cluster nodes
      command: kubectl get nodes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cluster_nodes
      changed_when: false
      failed_when: false
    
    - name: Display cluster nodes
      debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
      when: cluster_nodes.rc == 0

################################################################################
# Verify Worker Nodes
################################################################################
- name: Verify Kubernetes Worker Nodes
  hosts: workers
  become: yes
  gather_facts: no
  
  tasks:
    - name: Check if kubelet.conf exists
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
    
    - name: Verify worker joined cluster
      assert:
        that:
          - kubelet_conf.stat.exists
        fail_msg: "kubelet.conf not found - node may not have joined cluster"
        success_msg: "✓ Worker node joined cluster (kubelet.conf exists)"
    
    - name: Check kubelet service status
      command: systemctl is-active kubelet
      register: kubelet_active
      changed_when: false
      failed_when: false
    
    - name: Verify kubelet is active
      assert:
        that:
          - kubelet_active.stdout == "active"
        fail_msg: "kubelet service is not active"
        success_msg: "✓ kubelet service is active"

################################################################################
# Final Summary
################################################################################
- name: Verification Summary
  hosts: masters[0]
  become: yes
  gather_facts: no
  
  tasks:
    - name: Get node count
      shell: kubectl get nodes --no-headers | wc -l
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: node_count
      changed_when: false
      failed_when: false
    
    - name: Get ready node count
      shell: kubectl get nodes --no-headers | grep -c Ready || echo "0"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: ready_count
      changed_when: false
      failed_when: false
    
    - name: Display verification summary
      debug:
        msg:
          - "=========================================="
          - "Kubernetes Cluster Verification Complete"
          - "=========================================="
          - ""
          - "Total nodes: {{ node_count.stdout }}"
          - "Ready nodes: {{ ready_count.stdout }}"
          - ""
          - "Note: Nodes may show 'NotReady' if CNI is not installed yet."
          - "This is expected behavior when using --skip-phases for CNI."
          - ""
          - "All prerequisites are verified and installed correctly!"
          - "=========================================="





---
# Ensure GHCR docker-registry secret exists in each namespace in ghcr_secret_namespaces.
# Creates the namespace if missing, then creates or replaces the secret.
# Uses ghcr_secret_name, ghcr_secret_namespaces, ghcr_username, ghcr_password from group_vars.

- name: Ensure namespace {{ item }} exists
  command: kubectl create namespace {{ item }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ns_created
  failed_when: false
  changed_when: ns_created.rc == 0
  loop: "{{ ghcr_secret_namespaces | default(['tyr-system', 'monitoring']) }}"

- name: Check if {{ ghcr_secret_name | default('ghcr-secret') }} exists in {{ item }}
  command: kubectl get secret {{ ghcr_secret_name | default('ghcr-secret') }} -n {{ item }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: secret_check
  changed_when: false
  failed_when: false
  loop: "{{ ghcr_secret_namespaces | default(['tyr-system', 'monitoring']) }}"

- name: Create docker-registry secret {{ ghcr_secret_name | default('ghcr-secret') }} in {{ item.item }}
  command: >
    kubectl create secret docker-registry {{ ghcr_secret_name | default('ghcr-secret') }}
    --docker-server=ghcr.io
    --docker-username={{ ghcr_username }}
    --docker-password={{ ghcr_password }}
    --namespace={{ item.item }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  no_log: true
  when: item.rc != 0
  loop: "{{ secret_check.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Display GHCR secret status
  debug:
    msg: "✓ {{ ghcr_secret_name | default('ghcr-secret') }} ensured in {{ ghcr_secret_namespaces | default(['tyr-system', 'monitoring']) }}"

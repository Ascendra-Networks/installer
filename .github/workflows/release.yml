name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3 — no "v" prefix)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: ascendra-networks
  BACKEND_IMAGE: installer-backend
  UI_IMAGE: installer-ui
  NODE_VERSION: '18'

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Push Docker Images
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip the leading 'v' from the tag (v1.2.3 -> 1.2.3)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Releasing version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.BACKEND_IMAGE }}"

          docker build \
            -f installer/backend/Dockerfile \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            ./installer/backend

          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          echo "✅ Backend image pushed: ${IMAGE}:${VERSION}"

      - name: Build and push UI image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.UI_IMAGE }}"

          docker build \
            -f installer/ui/Dockerfile \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            ./installer/ui

          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          echo "✅ UI image pushed: ${IMAGE}:${VERSION}"

  # ──────────────────────────────────────────────
  # Job 2: Create GitHub Release with Changelog
  # ──────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          TAG_NAME="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "✅ Tag ${TAG_NAME} already exists on remote"
          else
            git tag -a "${TAG_NAME}" -m "Release ${VERSION}"
            git push origin "${TAG_NAME}"
            echo "✅ Tag ${TAG_NAME} created and pushed"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          TAG_NAME="v${VERSION}"

          # Find the most recent previous semver tag
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG_NAME}$" \
            | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            COMPARE_SECTION=""
          else
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_SECTION="**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME}"
          fi

          echo "Generating changelog for range: ${RANGE}"

          # Collect commits per conventional-commit category (case-insensitive prefix match)
          get_commits() {
            local pattern="$1"
            git log "${RANGE}" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              --no-merges \
              | grep -iE "^- ${pattern}" || true
          }

          FEATURES=$(get_commits "feat(\(.+\))?: |feature: ")
          FIXES=$(get_commits "fix(\(.+\))?: |bugfix: ")
          INFRA=$(get_commits "ci(\(.+\))?: |cd(\(.+\))?: |build(\(.+\))?: |infra(\(.+\))?: |docker: |ansible: |terraform: ")
          DOCS=$(get_commits "docs?(\(.+\))?: ")
          MAINTENANCE=$(get_commits "chore(\(.+\))?: |refactor(\(.+\))?: |perf(\(.+\))?: |style(\(.+\))?: |test(\(.+\))?: ")

          # Everything that didn't match a known prefix
          OTHER=$(git log "${RANGE}" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
            --no-merges \
            | grep -viE "^- (feat|feature|fix|bugfix|ci|cd|build|infra|docker|ansible|terraform|docs?|chore|refactor|perf|style|test)(\(.+\))?: " \
            || true)

          {
            echo "## What's Changed in v${VERSION}"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### New Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$INFRA" ]; then
              echo "### Infrastructure & Build"
              echo "$INFRA"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$MAINTENANCE" ]; then
              echo "### Maintenance"
              echo "$MAINTENANCE"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            if [ -z "$FEATURES$FIXES$INFRA$DOCS$MAINTENANCE$OTHER" ]; then
              echo "_No notable changes._"
              echo ""
            fi

            if [ -n "$COMPARE_SECTION" ]; then
              echo "${COMPARE_SECTION}"
              echo ""
            fi
          } > /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Build release body
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          REGISTRY="${{ env.REGISTRY }}"
          ORG="${{ env.IMAGE_ORG }}"

          {
            # 1. Changelog (the primary section — what actually changed)
            cat /tmp/changelog.md

            # 2. Docker images for this release
            echo ""
            echo "---"
            echo ""
            echo "## Docker Images"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| Backend   | \`${REGISTRY}/${ORG}/${{ env.BACKEND_IMAGE }}:${VERSION}\` |"
            echo "| UI        | \`${REGISTRY}/${ORG}/${{ env.UI_IMAGE }}:${VERSION}\` |"
            echo ""

            echo "> See the [README](https://github.com/${{ github.repository }}/blob/v${VERSION}/installer/README.md) for installation and configuration instructions."
          } > /tmp/release-body.md

          echo "Release body:"
          cat /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-and-push.outputs.version }}
          name: v${{ needs.build-and-push.outputs.version }}
          body_path: /tmp/release-body.md
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false

---
# Stop All Stress Tests
# Kills all running stress-ng processes on VMs

- name: Stop Stress Tests on KubeVirt VMs
  hosts: masters[0]
  gather_facts: no
  become: yes

  vars:
    vm_namespace: "default"
    ansible_ssh_user: "ubuntu"
    ansible_ssh_pass: "ubuntu"

  tasks:
    - name: Get all VMs
      shell: kubectl get vmi -n {{ vm_namespace }} -o json
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: vmi_output
      changed_when: false

    - name: Parse VM list
      set_fact:
        all_vms: "{{ (vmi_output.stdout | from_json).items }}"

    - name: Get VM IPs
      set_fact:
        vm_inventory: |
          {% set result = [] %}
          {% for vm in all_vms %}
            {% set _ = result.append({
              'name': vm.metadata.name,
              'ip': vm.status.interfaces[0].ipAddress
            }) %}
          {% endfor %}
          {{ result }}

    - name: Stop stress-ng on all VMs
      shell: |
        sshpass -p '{{ ansible_ssh_pass }}' ssh -o StrictHostKeyChecking=no \
          {{ ansible_ssh_user }}@{{ item.ip }} \
          'sudo pkill -9 stress-ng || true'
      loop: "{{ vm_inventory }}"
      register: stop_result
      changed_when: true

    - name: Display summary
      debug:
        msg:
          - "=== Stress Test Stopped ==="
          - "Stopped stress tests on {{ vm_inventory | length }} VMs"
          - ""
          - "Verify: kubectl top pods -l kubevirt.io=virt-launcher"





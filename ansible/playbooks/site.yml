---
# Main playbook for Kubernetes cluster deployment
# Three-phase execution with optimized parallelism

################################################################################
# Phase 1: Install Prerequisites on ALL nodes (parallel execution)
# NOTE: Automatically skipped if using custom Packer AMI
################################################################################
- name: Phase 1 - Install Kubernetes Prerequisites on All Nodes
  hosts: all
  become: yes
  gather_facts: yes
  strategy: free  # Allow hosts to run independently for maximum parallelism
  
  tasks:
    - name: Check if AMI is pre-configured with prerequisites
      stat:
        path: /etc/k8s-ami-info
      register: k8s_ami_info

    - name: Display AMI information (if using custom AMI)
      block:
        - name: Read AMI info file
          command: cat /etc/k8s-ami-info
          register: ami_info_content
          changed_when: false

        - name: Show custom AMI details
          debug:
            msg:
              - "=========================================="
              - "✅ Custom Packer AMI Detected!"
              - "=========================================="
              - "{{ ami_info_content.stdout_lines }}"
              - ""
              - "Skipping prerequisites installation (already baked into AMI)"
              - "This saves ~10-15 minutes per node!"
              - "=========================================="
      when: k8s_ami_info.stat.exists

    - name: Install prerequisites (only if NOT using custom AMI)
      block:
        - name: Show prerequisites installation notice
          debug:
            msg:
              - "=========================================="
              - "📦 Installing Prerequisites"
              - "=========================================="
              - "This will take ~10-15 minutes per node."
              - ""
              - "TIP: Speed up future deployments by building a custom AMI!"
              - "Run: cd packer && ./build.sh"
              - "=========================================="

        - name: Import prerequisites tasks
          import_tasks: ../tasks/prerequisites.yml
      when: not k8s_ami_info.stat.exists
  
  tags:
    - prerequisites
    - phase1

################################################################################
# Phase 2: Initialize Master Node (serial execution)
################################################################################
- name: Phase 2 - Initialize Kubernetes Master Node
  hosts: masters
  become: yes
  gather_facts: yes
  serial: 1  # Initialize one master at a time
  
  tasks:
    - name: Import master tasks
      import_tasks: ../tasks/master.yml
  
  tags:
    - master
    - init
    - phase2

################################################################################
# Phase 3: Join Dataplane Nodes (parallel execution)
################################################################################
- name: Phase 3 - Join Dataplane Nodes to Cluster
  hosts: workers
  become: yes
  gather_facts: yes
  strategy: free  # Allow dataplane nodes to join in parallel
  
  tasks:
    - name: Import dataplane tasks
      import_tasks: ../tasks/dataplane.yml
  
  tags:
    - workers
    - dataplane
    - join
    - phase3

################################################################################
# Phase 4: Display Cluster Status
################################################################################
- name: Phase 4 - Display Cluster Status
  hosts: masters[0]
  become: yes
  gather_facts: no
  
  tasks:
    - name: Get all nodes
      command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: all_nodes
      changed_when: false
      failed_when: false
    
    - name: Display all nodes
      debug:
        msg: "{{ all_nodes.stdout_lines }}"
      when: all_nodes.rc == 0
    
    - name: Get all pods (system)
      command: kubectl get pods -A
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: all_pods
      changed_when: false
      failed_when: false
    
    - name: Display all pods
      debug:
        msg: "{{ all_pods.stdout_lines }}"
      when: all_pods.rc == 0
    
    - name: Display completion message
      debug:
        msg:
          - "=========================================="
          - "Kubernetes Cluster Deployment Complete!"
          - "=========================================="
          - ""
          - "IMPORTANT: CNI Plugin Not Installed"
          - "Nodes will show 'NotReady' until you install a CNI plugin."
          - ""
          - "To install a CNI plugin, SSH to the master node and run:"
          - "  - Calico: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml"
          - "  - Flannel: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"
          - "  - Cilium: cilium install"
          - "  - Or install your preferred CNI plugin"
          - ""
          - "After installing CNI, nodes should transition to 'Ready' state."
          - "=========================================="
  
  tags:
    - status
    - phase4

---
# Kubernetes Master/Control Plane Setup
# Initialize and configure Kubernetes control plane node

# ============================================
# Check if Already Initialized
# ============================================

- name: Check if Kubernetes cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_already_initialized

- name: Skip initialization if already done
  debug:
    msg: "Kubernetes cluster is already initialized, skipping initialization steps"
  when: kubeadm_already_initialized.stat.exists

# ============================================
# Initialize Kubernetes Cluster
# ============================================

- name: Open firewall port for API server (Ubuntu/ufw)
  ufw:
    rule: allow
    port: '6443'
  ignore_errors: yes
  when:
    - not kubeadm_already_initialized.stat.exists
    - ansible_os_family == "Debian"

- name: Open firewall port for API server (SUSE/firewalld)
  shell: firewall-cmd --permanent --add-port=6443/tcp && firewall-cmd --reload
  ignore_errors: yes
  when:
    - not kubeadm_already_initialized.stat.exists
    - ansible_os_family == "Suse"

- name: Pull required images for kubeadm
  command: kubeadm config images pull
  retries: 3
  delay: 10
  when: not kubeadm_already_initialized.stat.exists

- name: Initialize Kubernetes cluster with kubeadm
  shell: |
    kubeadm init \
      --pod-network-cidr={{ pod_network_cidr }} \
      --ignore-preflight-errors=Swap \
      {{ '--skip-phases=addon/kube-proxy' if (skip_kube_proxy | default(false) | bool) else '' }}
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init_output
  when: not kubeadm_already_initialized.stat.exists

- name: Display kubeadm init output
  debug:
    var: kubeadm_init_output.stdout_lines
  when:
    - not kubeadm_already_initialized.stat.exists
    - kubeadm_init_output.changed

# ============================================
# Configure Kubectl Access
# ============================================

- name: Get primary group of {{ ansible_user }}
  command: id -gn {{ ansible_user }}
  register: ansible_user_group
  changed_when: false

- name: Create .kube directory for {{ ansible_user }}
  file:
    path: "{{ kubeconfig_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user_group.stdout }}"

- name: Copy admin.conf to user's kube config
  copy:
    src: "{{ admin_kubeconfig }}"
    dest: "{{ kubeconfig_dir }}/config"
    remote_src: yes
    mode: '0600'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user_group.stdout }}"

- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: '0755'

- name: Copy admin.conf to root's kube config
  copy:
    src: "{{ admin_kubeconfig }}"
    dest: /root/.kube/config
    remote_src: yes
    mode: '0600'

# ============================================
# Configure Kubelet for Swap Support
# ============================================

- name: Configure kubelet for swap support
  block:
    - name: Backup kubelet config
      copy:
        src: /var/lib/kubelet/config.yaml
        dest: /var/lib/kubelet/config.yaml.backup
        remote_src: yes
      ignore_errors: yes

    - name: Update failSwapOn to false
      lineinfile:
        path: /var/lib/kubelet/config.yaml
        regexp: '^failSwapOn:'
        line: 'failSwapOn: false'
        state: present

    - name: Add memorySwap configuration
      blockinfile:
        path: /var/lib/kubelet/config.yaml
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Swap Support"
        block: |
          memorySwap:
            swapBehavior: LimitedSwap
        insertafter: EOF

    - name: Restart kubelet after swap configuration
      systemd:
        name: kubelet
        state: restarted

# ============================================
# Wait for Cluster to Be Ready
# ============================================

- name: Wait for control plane to be ready
  command: kubectl get nodes
  environment:
    KUBECONFIG: "{{ admin_kubeconfig }}"
  register: kubectl_get_nodes
  until: kubectl_get_nodes.rc == 0
  retries: 10
  delay: 6
  changed_when: false

# ============================================
# Generate Join Command for Worker Nodes
# ============================================

- name: Generate join command for worker nodes
  command: kubeadm token create --print-join-command --ttl {{ token_ttl }}
  register: join_command_output
  changed_when: false

- name: Save join command to local file
  copy:
    content: "{{ join_command_output.stdout }} --ignore-preflight-errors=Swap"
    dest: /tmp/kubeadm_join_command.sh
    mode: '0755'
  delegate_to: localhost
  become: no

- name: Display join command
  debug:
    msg:
      - "============================================"
      - "Master node initialized successfully!"
      - "============================================"
      - ""
      - "Join command saved to: /tmp/kubeadm_join_command.sh"
      - ""
      - "Worker nodes can join using:"
      - "{{ join_command_output.stdout }} --ignore-preflight-errors=Swap"
      - ""
      - "============================================"

# ============================================
# Display Cluster Information
# ============================================

- name: Display cluster info
  command: kubectl cluster-info
  environment:
    KUBECONFIG: "{{ admin_kubeconfig }}"
  register: cluster_info
  changed_when: false

- name: Show cluster info
  debug:
    var: cluster_info.stdout_lines

- name: Get current nodes
  command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: "{{ admin_kubeconfig }}"
  register: get_nodes
  changed_when: false

- name: Show current nodes
  debug:
    var: get_nodes.stdout_lines

- name: Note about CNI installation
  debug:
    msg:
      - "============================================"
      - "IMPORTANT: CNI Plugin Not Installed"
      - "============================================"
      - ""
      - "Nodes will show 'NotReady' until you install a CNI plugin."
      - "Install your preferred CNI plugin manually."
      - ""
      - "Example (Calico):"
      - "  kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml"
      - "  curl https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/custom-resources.yaml -O"
      - "  sed -i 's/cidr: 192\\.168\\.0\\.0\\/16/cidr: 10.10.0.0\\/16/g' custom-resources.yaml"
      - "  kubectl create -f custom-resources.yaml"
      - ""
      - "============================================"





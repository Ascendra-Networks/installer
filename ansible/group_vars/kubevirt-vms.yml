---
# KubeVirt VM Deployment Configuration
# Copy this file to kubevirt-vms.yml and customize for your environment

# Resource Overcommit Ratios
# These determine how much you can oversubscribe CPU and memory
cpu_overcommit: 16          # 6:1 CPU overcommit ratio
memory_overcommit: 16       # 6:1 memory overcommit ratio

# Total Available Resources for VMs
# Set these to the total resources you want to allocate to VMs
# 2 worker nodes × 72 cores × 192 GB each = 144 cores, 384 GB total
# Adjusted to create exactly 54 VMs with 16x overcommit
# For 54 VMs: 54 × 16 cores / 16 = 54 cores, 54 × 42 GB / 16 = 142 GB
total_cpu_cores: 54        # Total CPU cores to allocate for exactly 54 VMs with 16x overcommit
total_memory_gb: 142       # Total memory in GB to create exactly 54 VMs with 16x overcommit

# Per-VM Resource Allocation (Limits)
# Each VM will be created with these resource limits
vm_cpu_cores: 16            # CPU cores per VM (limit)
vm_memory_gb: 42           # Memory in GB per VM (limit)

# VM Naming Configuration
vm_base_name: "vm"         # Base name for VMs (will be vm1, vm2, vm3, etc.)
vm_namespace: "default"    # Kubernetes namespace for VMs

# Storage Configuration
# Choose between ephemeral containerDisk or persistent NFS storage
use_nfs_storage: false     # Set to true to use NFS, false for containerDisk

# NFS Storage Options (only used if use_nfs_storage: true)
nfs_server: "192.168.1.100"              # NFS server IP or hostname
nfs_path: "/srv/kubevirt_storage/vm-disks"  # NFS export path
disk_size: "100Gi"                       # Disk size per VM

# OS Image Configuration
# Container disk image to use (only used if use_nfs_storage: false)
os_image: "quay.io/containerdisks/ubuntu:24.04"

# SSH Key Configuration
# Path to SSH public key for VM access
ssh_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa.pub"

# Advanced Options
output_dir: "/tmp/kubevirt-vms"  # Temporary directory for generated manifests

# Example Configurations:
# ------------------------

# High-Density Configuration (lots of small VMs):
# cpu_overcommit: 16
# memory_overcommit: 16
# total_cpu_cores: 128
# total_memory_gb: 256
# vm_cpu_cores: 4
# vm_memory_gb: 4
# Result: ~512 VMs (128*16/4 = 512 by CPU, 256*16/4 = 1024 by memory)

# Balanced Configuration (moderate overcommit):
# cpu_overcommit: 4
# memory_overcommit: 4
# total_cpu_cores: 64
# total_memory_gb: 128
# vm_cpu_cores: 8
# vm_memory_gb: 8
# Result: ~32 VMs

# Conservative Configuration (minimal overcommit):
# cpu_overcommit: 2
# memory_overcommit: 2
# total_cpu_cores: 32
# total_memory_gb: 64
# vm_cpu_cores: 4
# vm_memory_gb: 8
# Result: ~16 VMs (32*2/4 = 16 by CPU, 64*2/8 = 16 by memory)

---
# Wrapper Playbook: Evict VMs from master node
# This playbook evicts/migrates VMs from the master where kubectl/virtctl have access

- name: Evict KubeVirt VMs via Master Node
  hosts: masters[0]
  gather_facts: yes
  become: yes

  vars:
    vm_namespace: "default"
    vm_names: []              # List of VM names to evict, e.g., ['vm5', 'vm8']
    vm_modulo: 0              # 0 = use vm_names list, N = evict based on modulo
    vm_modulo_remainder: 0    # Remainder filter for modulo selection
    num_vms: 12               # Total number of VMs (for modulo mode)
    vm_base_name: "vm"        # Base name for VMs

  tasks:
    - name: Build VM list based on modulo if specified
      set_fact:
        vms_to_evict: >-
          {%- if vm_modulo | int > 0 -%}
            {%- set result = [] -%}
            {%- for i in range(1, num_vms | int + 1) -%}
              {%- if (i % (vm_modulo | int)) == (vm_modulo_remainder | int) -%}
                {%- set _ = result.append(vm_base_name ~ i) -%}
              {%- endif -%}
            {%- endfor -%}
            {{ result }}
          {%- else -%}
            {{ vm_names }}
          {%- endif -%}

    - name: Validate VMs to evict
      assert:
        that:
          - vms_to_evict | length > 0
        fail_msg: |
          Please provide either:
          - vm_names list: -e 'vm_names=["vm5","vm8"]'
          - OR modulo: -e "vm_modulo=4" -e "vm_modulo_remainder=1"

    - name: Display eviction plan
      debug:
        msg:
          - "=== VM Eviction Plan ==="
          - "Namespace: {{ vm_namespace }}"
          - "VMs to evict: {{ vms_to_evict }}"
          - "Selection: {% if vm_modulo | int > 0 %}Modulo {{ vm_modulo }}, Remainder {{ vm_modulo_remainder }}{% else %}Manual list{% endif %}"

    - name: Get current VM status and node location
      shell: |
        echo "VM: {{ item }}"
        kubectl get vmi {{ item }} -n {{ vm_namespace }} -o jsonpath='Node: {.status.nodeName}' 2>/dev/null || echo "Node: NOT FOUND"
        echo ""
        kubectl get vmi {{ item }} -n {{ vm_namespace }} -o jsonpath='Phase: {.status.phase}' 2>/dev/null || echo "Phase: NOT FOUND"
      loop: "{{ vms_to_evict }}"
      register: vm_status_before
      ignore_errors: yes

    - name: Display current VM locations
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ vm_status_before.results }}"

    - name: Check if virtctl is installed
      command: which virtctl
      register: virtctl_check
      changed_when: false
      failed_when: false

    - name: Install virtctl if not present
      block:
        - name: Download virtctl
          get_url:
            url: "https://github.com/kubevirt/kubevirt/releases/download/v1.1.0/virtctl-v1.1.0-linux-amd64"
            dest: /usr/local/bin/virtctl
            mode: '0755'
          when: virtctl_check.rc != 0
      rescue:
        - name: Warn about virtctl installation failure
          debug:
            msg: "Could not install virtctl automatically. Will use pod deletion method."

    - name: Trigger VM migration using virtctl
      command: virtctl migrate {{ item }} -n {{ vm_namespace }}
      loop: "{{ vms_to_evict }}"
      register: migrate_results
      ignore_errors: yes

    - name: Display migration trigger status
      debug:
        msg: "Migration triggered for {{ item.item }}: {{ 'SUCCESS' if item.rc == 0 else 'FAILED - ' ~ item.stderr }}"
      loop: "{{ migrate_results.results }}"

    - name: Wait for migrations to start
      pause:
        seconds: 5

    - name: Monitor migration progress
      shell: |
        kubectl get virtualmachineinstancemigration -n {{ vm_namespace }} -o json | \
        jq -r '.items[] | select(.spec.vmiName=="{{ item }}") | "Status: \(.status.phase // "Unknown")"'
      loop: "{{ vms_to_evict }}"
      register: migration_progress
      until: migration_progress.stdout is search("Succeeded") or migration_progress.stdout is search("Failed")
      retries: 60
      delay: 5
      ignore_errors: yes

    - name: Get new VM locations
      shell: |
        echo "VM: {{ item }}"
        kubectl get vmi {{ item }} -n {{ vm_namespace }} -o jsonpath='Node: {.status.nodeName}' 2>/dev/null || echo "Node: NOT FOUND"
        echo ""
        kubectl get vmi {{ item }} -n {{ vm_namespace }} -o jsonpath='Phase: {.status.phase}' 2>/dev/null || echo "Phase: NOT FOUND"
      loop: "{{ vms_to_evict }}"
      register: vm_status_after
      ignore_errors: yes

    - name: Display new VM locations
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ vm_status_after.results }}"

    - name: Compare VM locations
      debug:
        msg:
          - "=== Migration Summary for {{ item.item }} ==="
          - "Before: {{ vm_status_before.results[ansible_loop.index0].stdout_lines | join(' ') }}"
          - "After:  {{ item.stdout_lines | join(' ') }}"
      loop: "{{ vm_status_after.results }}"
      loop_control:
        extended: yes

    - name: Get all migration events
      shell: kubectl get events -n {{ vm_namespace }} --sort-by='.lastTimestamp' | grep -i migration | tail -20
      register: migration_events
      ignore_errors: yes

    - name: Display migration events
      debug:
        var: migration_events.stdout_lines
      when: migration_events.stdout_lines is defined

    - name: Final summary
      debug:
        msg:
          - "=== Eviction Complete ==="
          - "VMs evicted: {{ vms_to_evict | join(', ') }}"
          - "Total VMs: {{ vms_to_evict | length }}"
          - ""
          - "Verify migration:"
          - "  kubectl get vmis -n {{ vm_namespace }} -o wide"
          - "  kubectl get virtualmachineinstancemigration -n {{ vm_namespace }}"





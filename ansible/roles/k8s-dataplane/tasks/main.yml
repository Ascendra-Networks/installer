---
# Kubernetes Dataplane (Worker) Node Setup
# Join worker nodes to the Kubernetes cluster

# ============================================
# Check if Already Joined
# ============================================

- name: Check if node is already part of a cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf_exists

- name: Skip joining if already part of cluster
  debug:
    msg: "Node is already part of a Kubernetes cluster, skipping join"
  when: kubelet_conf_exists.stat.exists

# ============================================
# Validate Join Command Exists
# ============================================

- name: Check if join command file exists
  stat:
    path: /tmp/kubeadm_join_command.sh
  delegate_to: localhost
  become: no
  register: join_command_file
  run_once: true
  when: not kubelet_conf_exists.stat.exists

- name: Fail if join command is not available
  fail:
    msg: "Join command not found. Please ensure the master node has been initialized first."
  when:
    - not kubelet_conf_exists.stat.exists
    - not join_command_file.stat.exists
  run_once: true

# ============================================
# Join Node to Cluster
# ============================================

- name: Read join command from file
  slurp:
    src: /tmp/kubeadm_join_command.sh
  delegate_to: localhost
  become: no
  register: join_command_encoded
  run_once: true
  when: not kubelet_conf_exists.stat.exists

- name: Set join command fact
  set_fact:
    kubeadm_join_command: "{{ join_command_encoded.content | b64decode | trim }}"
  when: not kubelet_conf_exists.stat.exists

- name: Display join command
  debug:
    msg:
      - "============================================"
      - "Joining worker node to cluster"
      - "============================================"
      - "{{ kubeadm_join_command }}"
  when: not kubelet_conf_exists.stat.exists

- name: Join node to cluster
  shell: "{{ kubeadm_join_command }}"
  args:
    creates: /etc/kubernetes/kubelet.conf
  register: join_output
  when: not kubelet_conf_exists.stat.exists

- name: Display join output
  debug:
    var: join_output.stdout_lines
  when:
    - not kubelet_conf_exists.stat.exists
    - join_output.changed

# ============================================
# Configure Kubelet for Swap Support
# ============================================

- name: Configure kubelet for swap support
  block:
    - name: Wait for kubelet config to be created
      wait_for:
        path: /var/lib/kubelet/config.yaml
        timeout: 60

    - name: Backup kubelet config
      copy:
        src: /var/lib/kubelet/config.yaml
        dest: /var/lib/kubelet/config.yaml.backup
        remote_src: yes
      ignore_errors: yes

    - name: Update failSwapOn to false
      lineinfile:
        path: /var/lib/kubelet/config.yaml
        regexp: '^failSwapOn:'
        line: 'failSwapOn: false'
        state: present

    - name: Add memorySwap configuration
      blockinfile:
        path: /var/lib/kubelet/config.yaml
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Swap Support"
        block: |
          memorySwap:
            swapBehavior: LimitedSwap
        insertafter: EOF

    - name: Restart kubelet after swap configuration
      systemd:
        name: kubelet
        state: restarted

# ============================================
# Verify Node Health
# ============================================

- name: Wait for kubelet to be ready
  systemd:
    name: kubelet
    state: started
    enabled: yes

- name: Wait a moment for node to register with cluster
  pause:
    seconds: 10

- name: Verify kubelet is running
  command: systemctl is-active kubelet
  register: kubelet_active
  changed_when: false
  failed_when: kubelet_active.stdout != "active"

- name: Show success message
  debug:
    msg:
      - "============================================"
      - "Worker node successfully joined the cluster!"
      - "============================================"
      - ""
      - "Kubelet is running with swap support enabled."
      - "Check master node for node status: kubectl get nodes"
      - ""





---
# Main playbook for Kubernetes cluster deployment
# Five-phase execution with optimized parallelism

################################################################################
# Phase 0: Bootstrap Python on all nodes (required for Ansible modules)
################################################################################
- name: Phase 0 - Bootstrap Python on All Nodes
  hosts: all
  become: yes
  gather_facts: no
  strategy: free

  tasks:
    - name: Check if python3 is available
      raw: command -v python3
      register: python3_check
      changed_when: false
      failed_when: false

    - name: Install python3 via apt (Debian/Ubuntu)
      raw: |
        if command -v apt-get > /dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq python3 python3-apt
        fi
      when: python3_check.rc != 0
      register: apt_python
      changed_when: "'Setting up python3' in (apt_python.stdout | default(''))"
      failed_when: false

    - name: Install python3 via zypper (SUSE/SLES)
      raw: |
        if command -v zypper > /dev/null 2>&1; then
          zypper --non-interactive install -y python3
        fi
      when: python3_check.rc != 0 and (apt_python.stdout | default('')) == ''
      changed_when: false
      failed_when: false

    - name: Verify python3 is now available
      raw: python3 --version
      changed_when: false

  tags:
    - bootstrap
    - phase0

################################################################################
# Phase 0.5: Verify sudo/root access on all nodes
################################################################################
- name: Phase 0.5 - Verify Root Access on All Nodes
  hosts: all
  become: yes
  gather_facts: no
  strategy: free

  tasks:
    - name: Verify we are running as root
      raw: id -u
      register: uid_check
      changed_when: false

    - name: Fail if not running as root
      fail:
        msg: >
          Not running as root (uid={{ uid_check.stdout | trim }}).
          Ensure the SSH user has passwordless sudo or connect as root directly.
      when: (uid_check.stdout | trim) != "0"

  tags:
    - verify
    - phase0

################################################################################
# Phase 1: Install Prerequisites on ALL nodes (parallel execution)
################################################################################
- name: Phase 1 - Install Kubernetes Prerequisites on All Nodes
  hosts: all
  become: yes
  gather_facts: yes
  strategy: free  # Allow hosts to run independently for maximum parallelism

  vars:
    kubernetes_version: "1.31"
    containerd_config_dir: /etc/containerd
    containerd_config_file: /etc/containerd/config.toml
    pod_network_cidr: "10.10.0.0/16"
    service_cidr: "10.96.0.0/12"
    kernel_modules:
      - overlay
      - br_netfilter
    sysctl_config:
      net.bridge.bridge-nf-call-iptables: 1
      net.bridge.bridge-nf-call-ip6tables: 1
      net.ipv4.ip_forward: 1
    disable_swap: true

  tasks:
    - name: Import prerequisites tasks
      import_tasks: ../tasks/prerequisites.yml
  
  tags:
    - prerequisites
    - phase1

################################################################################
# Phase 2: Initialize Master Node (serial execution)
################################################################################
- name: Phase 2 - Initialize Kubernetes Master Node
  hosts: masters
  become: yes
  gather_facts: yes
  serial: 1  # Initialize one master at a time

  vars:
    pod_network_cidr: "10.10.0.0/16"
    service_cidr: "10.96.0.0/12"
    admin_kubeconfig: /etc/kubernetes/admin.conf
    token_ttl: "24h"

  pre_tasks:
    - name: Set kubeconfig directory
      set_fact:
        kubeconfig_dir: "/home/{{ ansible_user }}/.kube"
      when: kubeconfig_dir is not defined

  tasks:
    - name: Import master tasks
      import_tasks: ../tasks/master.yml
  
  tags:
    - master
    - init
    - phase2

################################################################################
# Phase 3: Join Dataplane Nodes (parallel execution)
################################################################################
- name: Phase 3 - Join Dataplane Nodes to Cluster
  hosts: workers
  become: yes
  gather_facts: yes
  strategy: free  # Allow dataplane nodes to join in parallel
  
  tasks:
    - name: Import dataplane tasks
      import_tasks: ../tasks/dataplane.yml
  
  tags:
    - workers
    - dataplane
    - join
    - phase3

################################################################################
# Phase 4: Display Cluster Status
################################################################################
- name: Phase 4 - Display Cluster Status
  hosts: masters[0]
  become: yes
  gather_facts: no
  
  tasks:
    - name: Get all nodes
      command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: all_nodes
      changed_when: false
      failed_when: false
    
    - name: Display all nodes
      debug:
        msg: "{{ all_nodes.stdout_lines }}"
      when: all_nodes.rc == 0
    
    - name: Get all pods (system)
      command: kubectl get pods -A
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: all_pods
      changed_when: false
      failed_when: false
    
    - name: Display all pods
      debug:
        msg: "{{ all_pods.stdout_lines }}"
      when: all_pods.rc == 0
    
    - name: Display completion message
      debug:
        msg:
          - "=========================================="
          - "Kubernetes Cluster Deployment Complete!"
          - "=========================================="
          - ""
          - "IMPORTANT: CNI Plugin Not Installed"
          - "Nodes will show 'NotReady' until you install a CNI plugin."
          - ""
          - "To install a CNI plugin, SSH to the master node and run:"
          - "  - Calico: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml"
          - "  - Flannel: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"
          - "  - Cilium: cilium install"
          - "  - Or install your preferred CNI plugin"
          - ""
          - "After installing CNI, nodes should transition to 'Ready' state."
          - "=========================================="
  
  tags:
    - status
    - phase4

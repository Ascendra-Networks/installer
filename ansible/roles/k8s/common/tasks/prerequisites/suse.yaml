---
# SUSE/SLES Prerequisites - Package Installation and K8s Repo Setup

# ============================================
# Proxy Configuration (systemd drop-in)
# Must run before containerd/kubelet so all spawned services inherit proxy vars.
# ============================================

- name: Create systemd system.conf.d directory
  file:
    path: /etc/systemd/system.conf.d
    state: directory
    mode: '0755'
  when: proxy_enabled | default(false) | bool

- name: Write systemd proxy drop-in (zzzz-proxy.conf)
  copy:
    dest: /etc/systemd/system.conf.d/zzzz-proxy.conf
    content: |
      [Manager]
      DefaultEnvironment="HTTP_PROXY={{ HTTP_PROXY }}"
      DefaultEnvironment="http_proxy={{ http_proxy }}"
      DefaultEnvironment="HTTPS_PROXY={{ HTTPS_PROXY }}"
      DefaultEnvironment="https_proxy={{ https_proxy }}"
      DefaultEnvironment="NO_PROXY={{ NO_PROXY }}"
      DefaultEnvironment="no_proxy={{ no_proxy }}"
    mode: '0644'
  when: proxy_enabled | default(false) | bool

- name: Remove systemd proxy drop-in when proxy is disabled
  file:
    path: /etc/systemd/system.conf.d/zzzz-proxy.conf
    state: absent
  when: not (proxy_enabled | default(false) | bool)

- name: Write proxy vars to /etc/environment (interactive shells and non-systemd tools)
  blockinfile:
    path: /etc/environment
    marker: "# {mark} ASCENDRA PROXY"
    block: |
      HTTP_PROXY="{{ HTTP_PROXY }}"
      http_proxy="{{ http_proxy }}"
      HTTPS_PROXY="{{ HTTPS_PROXY }}"
      https_proxy="{{ https_proxy }}"
      NO_PROXY="{{ NO_PROXY }}"
      no_proxy="{{ no_proxy }}"
    create: yes
    mode: '0644'
  when: proxy_enabled | default(false) | bool

- name: Remove proxy vars from /etc/environment when proxy is disabled
  blockinfile:
    path: /etc/environment
    marker: "# {mark} ASCENDRA PROXY"
    block: ""
  when: not (proxy_enabled | default(false) | bool)
  failed_when: false

- name: Reload systemd manager to apply proxy environment
  command: systemctl daemon-reexec
  when: proxy_enabled | default(false) | bool

# ============================================
# Refresh Repositories and Install Base Packages
# ============================================

- name: Refresh zypper repositories
  community.general.zypper:
    name: '*'
    state: latest
    update_cache: yes
  retries: 3
  delay: 10
  changed_when: false
  failed_when: false

- name: Install prerequisite packages
  community.general.zypper:
    name:
      - curl
      - ca-certificates
      - gnupg
      - conntrack-tools
      - kmod
      - python3
      - jq
    state: present
  retries: 3
  delay: 10

# ============================================
# Open vSwitch (parity with Ubuntu openvswitch-switch)
# ============================================

- name: Add Open vSwitch repo (OBS network repo for SLE 15 / Leap 15)
  ansible.builtin.shell: |
    zypper addrepo --refresh --check \
      'https://download.opensuse.org/repositories/network/{{ suse_openvswitch_repo | default("SLE_15") }}/network.repo' \
      network-openvswitch
  args:
    creates: /etc/zypp/repos.d/network-openvswitch.repo
  register: openvswitch_repo
  failed_when: false

- name: Refresh zypper after adding Open vSwitch repo
  community.general.zypper:
    update_cache: yes
  when: openvswitch_repo.rc == 0

- name: Install Open vSwitch (SUSE, same as openvswitch-switch on Ubuntu)
  community.general.zypper:
    name: openvswitch
    state: present
  retries: 2
  delay: 5
  failed_when: false

- name: Create containerd configuration directory
  file:
    path: "{{ containerd_config_dir | default('/etc/containerd') }}"
    state: directory
    mode: '0755'

- name: Check if containerd is available
  shell: which containerd 2>/dev/null || find /usr/bin /usr/sbin /usr/local/bin -name containerd 2>/dev/null | head -1
  register: containerd_bin
  changed_when: false
  failed_when: false

- name: Check if containerd config has actual content
  shell: grep -c '^\[' {{ containerd_config_file | default('/etc/containerd/config.toml') }} 2>/dev/null || echo "0"
  register: containerd_config_sections
  changed_when: false
  failed_when: false

- name: Generate default containerd configuration
  shell: "{{ containerd_bin.stdout | trim }} config default > {{ containerd_config_file | default('/etc/containerd/config.toml') }}"
  when: containerd_bin.stdout | length > 0 and (containerd_config_sections.stdout | trim | int) == 0
  failed_when: false

- name: Configure containerd to use systemd cgroup driver
  replace:
    path: "{{ containerd_config_file | default('/etc/containerd/config.toml') }}"
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  when: ansible_service_mgr == 'systemd'
  failed_when: false

- name: Check if running inside a container
  stat:
    path: /.dockerenv
  register: dockerenv_check

- name: Configure containerd native snapshotter for container environments
  shell: |
    if [ -f {{ containerd_config_file | default('/etc/containerd/config.toml') }} ]; then
      sed -i 's/snapshotter = "overlayfs"/snapshotter = "native"/' {{ containerd_config_file | default('/etc/containerd/config.toml') }}
    fi
  when: dockerenv_check.stat.exists or ansible_service_mgr != 'systemd'
  failed_when: false

- name: Test overlayfs whiteout xattr support on containerd data directory
  shell: |
    mkdir -p /var/lib/containerd
    testfile=$(mktemp /var/lib/containerd/.xattr-test.XXXXXX)
    result=$(python3 -c "
    import os, sys
    try:
        os.setxattr(sys.argv[1], b'trusted.overlay.opaque', b'y')
        print('supported')
    except (OSError, IOError):
        print('not_supported')
    " "$testfile" 2>/dev/null)
    rm -f "$testfile"
    echo "$result"
  register: overlayfs_xattr_test
  changed_when: false
  failed_when: false

- name: Fall back to native snapshotter if overlayfs whiteouts not supported
  shell: |
    sed -i 's/snapshotter = "overlayfs"/snapshotter = "native"/' {{ containerd_config_file | default('/etc/containerd/config.toml') }}
  when: overlayfs_xattr_test.stdout is defined and "not_supported" in overlayfs_xattr_test.stdout
  failed_when: false

- name: Restart containerd service (systemd)
  systemd:
    name: containerd
    state: restarted
    daemon_reload: yes
  when: ansible_service_mgr == 'systemd'

- name: Enable containerd service (systemd)
  systemd:
    name: containerd
    enabled: yes
  when: ansible_service_mgr == 'systemd'

- name: Ensure containerd runtime directories exist (non-systemd)
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /run/containerd
    - /var/run/containerd
  when: ansible_service_mgr != 'systemd'
  failed_when: false

- name: Start containerd directly (non-systemd)
  shell: |
    pkill -x containerd || true
    sleep 1
    nohup containerd > /var/log/containerd.log 2>&1 &
    for i in $(seq 1 15); do
      if [ -S /run/containerd/containerd.sock ] || [ -S /var/run/containerd/containerd.sock ]; then
        exit 0
      fi
      sleep 2
    done
    echo "containerd socket not found after 30s" >&2
    cat /var/log/containerd.log >&2 || true
    exit 1
  when: ansible_service_mgr != 'systemd' and containerd_bin.stdout | length > 0

- name: Symlink containerd socket for compatibility
  shell: |
    if [ -S /run/containerd/containerd.sock ] && [ ! -S /var/run/containerd/containerd.sock ]; then
      ln -sf /run/containerd/containerd.sock /var/run/containerd/containerd.sock
    elif [ -S /var/run/containerd/containerd.sock ] && [ ! -S /run/containerd/containerd.sock ]; then
      mkdir -p /run/containerd
      ln -sf /var/run/containerd/containerd.sock /run/containerd/containerd.sock
    fi
  failed_when: false

# ============================================
# Disable firewalld (K8s CNI manages networking)
# ============================================

- name: Stop firewalld (systemd)
  systemd:
    name: firewalld
    state: stopped
  failed_when: false
  when: ansible_service_mgr == 'systemd'

- name: Disable firewalld (systemd)
  systemd:
    name: firewalld
    enabled: no
  failed_when: false
  when: ansible_service_mgr == 'systemd'

# ============================================
# Install Kubernetes Tools
# ============================================
# pkgs.k8s.io repo path uses major.minor only (e.g. v1.35), not full version (v1.35.1)
- name: Set Kubernetes repo version (major.minor for repo URL)
  set_fact:
    kubernetes_version_repo: "{{ (kubernetes_version | default('1.31')) | regex_replace('^(\\d+\\.\\d+).*', '\\1') }}"

- name: Import Kubernetes RPM GPG key
  rpm_key:
    key: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_repo }}/rpm/repodata/repomd.xml.key"
    state: present
  retries: 3
  delay: 10

- name: Check if Kubernetes zypper repo exists
  command: zypper repos kubernetes
  register: k8s_repo_check
  changed_when: false
  failed_when: false

- name: Add Kubernetes zypper repository
  command: >
    zypper addrepo --gpgcheck --refresh --priority 120
    https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_repo }}/rpm/
    kubernetes
  when: k8s_repo_check.rc != 0
  retries: 3
  delay: 10

- name: Refresh zypper repos after adding Kubernetes repository
  command: zypper refresh
  changed_when: false
  retries: 3
  delay: 10

- name: Remove Kubernetes package locks (so upgrade can install new version)
  command: zypper removelock kubelet kubeadm kubectl helm
  changed_when: false
  failed_when: false

- name: Install Kubernetes tools (kubelet, kubeadm, kubectl, helm) at target version
  community.general.zypper:
    name:
      - "kubelet={{ kubernetes_version | default('1.31') }}"
      - "kubeadm={{ kubernetes_version | default('1.31') }}"
      - "kubectl={{ kubernetes_version | default('1.31') }}"
      - helm
    state: present
  register: k8s_tools_installed

- name: Lock Kubernetes packages at current version
  command: zypper addlock kubelet kubeadm kubectl helm
  when: k8s_tools_installed.changed

- name: Enable kubelet service (systemd)
  systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes
  when: ansible_service_mgr == 'systemd'

- name: Create kubelet service directory for extra configuration
  file:
    path: /etc/systemd/system/kubelet.service.d
    state: directory
    mode: '0755'
  failed_when: false

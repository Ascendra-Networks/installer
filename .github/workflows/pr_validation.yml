name: PR Validation

on:
  pull_request:
    branches:
      - main
      - master
      - 'release/*'
  push:
    branches:
      - main
      - master
      - 'release/*'
  workflow_dispatch:

# Cancel previous runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Backend Code Quality
  # ──────────────────────────────────────────────
  backend-code-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: installer/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript syntax
        run: |
          echo "Checking syntax for all JS files..."
          find . -name "*.js" -not -path "./node_modules/*" | while read -r file; do
            node --check "$file" && echo "  ✅ $file" || { echo "  ❌ Syntax error in $file"; exit 1; }
          done
          echo "✅ All backend JS files passed syntax validation"

      - name: Run linter
        run: npm run lint || echo "ℹ️  No linter configured, skipping"

      - name: Check for security issues
        run: npm audit --audit-level=high || echo "⚠️  Audit completed with warnings"

  # ──────────────────────────────────────────────
  # Job 2: UI Code Quality
  # ──────────────────────────────────────────────
  ui-code-quality:
    name: UI Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer/ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: installer/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint || echo "ℹ️  No linter configured, skipping"

      - name: Check for security issues
        run: npm audit --audit-level=high || echo "⚠️  Audit completed with warnings"

  # ──────────────────────────────────────────────
  # Job 3: UI Build
  # ──────────────────────────────────────────────
  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    needs: ui-code-quality
    defaults:
      run:
        working-directory: installer/ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: installer/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build output directory 'dist' not found"
            exit 1
          fi
          DIST_SIZE=$(du -sh dist | cut -f1)
          echo "✅ UI build successful (dist size: ${DIST_SIZE})"
          ls -lh dist/

  # ──────────────────────────────────────────────
  # Job 4: Docker Build Verification
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build \
            -f installer/backend/Dockerfile \
            -t installer-backend:pr-${{ github.event.pull_request.number || 'push' }} \
            ./installer/backend
          echo "✅ Backend image built successfully"

      - name: Build UI image
        run: |
          docker build \
            -f installer/ui/Dockerfile \
            -t installer-ui:pr-${{ github.event.pull_request.number || 'push' }} \
            ./installer/ui
          echo "✅ UI image built successfully"

      - name: Verify images
        run: |
          echo "Built images:"
          docker images | grep "installer-"
          echo "✅ All Docker images built successfully"

  # ──────────────────────────────────────────────
  # Job 5: Security Scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run Trivy summary (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ──────────────────────────────────────────────
  # Summary (requires all jobs)
  # ──────────────────────────────────────────────
  pr-validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [backend-code-quality, ui-code-quality, ui-build, docker-build, security]
    if: always()

    steps:
      - name: Evaluate job results
        run: |
          echo "Job Results:"
          echo "  Backend Code Quality : ${{ needs.backend-code-quality.result }}"
          echo "  UI Code Quality      : ${{ needs.ui-code-quality.result }}"
          echo "  UI Build             : ${{ needs.ui-build.result }}"
          echo "  Docker Build         : ${{ needs.docker-build.result }}"
          echo "  Security Scan        : ${{ needs.security.result }}"

          REQUIRED_JOBS=(
            "${{ needs.backend-code-quality.result }}"
            "${{ needs.ui-code-quality.result }}"
            "${{ needs.ui-build.result }}"
            "${{ needs.docker-build.result }}"
          )

          for result in "${REQUIRED_JOBS[@]}"; do
            if [ "$result" != "success" ]; then
              echo ""
              echo "❌ One or more required checks failed."
              exit 1
            fi
          done

          echo ""
          echo "✅ All required checks passed!"

      - name: Post PR summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Backend Code Quality': '${{ needs.backend-code-quality.result }}',
              'UI Code Quality':      '${{ needs.ui-code-quality.result }}',
              'UI Build':             '${{ needs.ui-build.result }}',
              'Docker Build':         '${{ needs.docker-build.result }}',
              'Security Scan':        '${{ needs.security.result }}',
            };

            const required = ['Backend Code Quality', 'UI Code Quality', 'UI Build', 'Docker Build'];
            const allPassed = required.every(k => results[k] === 'success');

            const icon = r => r === 'success' ? '✅ Passed' : r === 'skipped' ? '⏭️ Skipped' : '❌ Failed';
            const rows = Object.entries(results)
              .map(([name, r]) => `| ${name} | ${icon(r)} |`)
              .join('\n');

            const body = [
              '## PR Validation Summary',
              '',
              '| Check | Status |',
              '|-------|--------|',
              rows,
              '',
              allPassed
                ? '### ✅ All required checks passed — ready to merge.'
                : '### ❌ Some required checks failed — please review the logs above.',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

---
# Prerequisites for creating K8s nodes (all nodes): env_vars, OS-specific packages, kernel/sysctl/swap.

- name: Apply cluster/node environment variables to this host
  import_tasks: env_vars.yml

- name: Include Ubuntu/Debian prerequisites
  include_tasks: prerequisites/ubuntu.yaml
  when: ansible_os_family == "Debian"

- name: Include SUSE/SLES prerequisites
  include_tasks: prerequisites/suse.yaml
  when: ansible_os_family == "Suse"

# Kernel modules (OS-agnostic)
- name: Load kernel modules immediately
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules | default(['overlay', 'br_netfilter']) }}"
  failed_when: false

- name: Ensure kernel modules load on boot
  lineinfile:
    path: /etc/modules-load.d/k8s.conf
    line: "{{ item }}"
    create: yes
    mode: '0644'
  loop: "{{ kernel_modules | default(['overlay', 'br_netfilter']) }}"
  failed_when: false

- name: Configure sysctl parameters for Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    state: present
    reload: yes
  loop: "{{ (sysctl_config | default({'net.bridge.bridge-nf-call-iptables': 1, 'net.bridge.bridge-nf-call-ip6tables': 1, 'net.ipv4.ip_forward': 1})) | dict2items }}"
  failed_when: false

- name: Apply sysctl parameters immediately
  command: sysctl --system
  changed_when: false
  failed_when: false

# Disable swap (OS-agnostic)
- name: Check if swap is enabled
  command: swapon --show
  register: swap_status
  changed_when: false
  failed_when: false

- name: Disable swap immediately
  command: swapoff -a
  when: swap_status.stdout != ""
  failed_when: false

- name: Remove swap entries from /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    line: '# \1'
    backrefs: yes
    state: present
  when: disable_swap | default(true) | bool
  failed_when: false

- name: Ensure swap is disabled on reboot
  systemd:
    name: swap.target
    masked: yes
  failed_when: false
